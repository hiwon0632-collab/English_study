<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Study</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f4;
  --surface: #fff;
  --surface2: #f3f0e8;
  --border: #e8e2d6;
  --border2: #d4cdc0;
  --accent: #3d6b4f;
  --accent-l: rgba(61,107,79,0.09);
  --blue: #3a5f8a;
  --blue-l: rgba(58,95,138,0.08);
  --text: #1c1c1c;
  --text2: #6b6560;
  --text3: #aaa49c;
  --green: #2a6645;
  --red: #b34040;
  --orange: #b36030;
  --r: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-weight:400;min-height:100vh;}

/* ── UPLOAD SCREEN ── */
#upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:24px;}
.logo-big{font-family:'Lora',serif;font-size:2rem;color:var(--accent);text-align:center;}
.logo-big span{display:block;font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--text3);font-weight:400;margin-top:4px;}
.drop-zone{border:2px dashed var(--border2);border-radius:16px;padding:48px 44px;text-align:center;cursor:pointer;transition:all .2s;max-width:440px;width:100%;background:var(--surface);}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(61,107,79,.03);}
.drop-icon{font-size:2.2rem;margin-bottom:10px;}
.drop-zone h3{font-size:.98rem;font-weight:600;margin-bottom:5px;}
.drop-zone p{font-size:.81rem;color:var(--text2);}
.drop-zone p strong{color:var(--accent);}
#csv-input-init{display:none;}
.csv-spec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px;max-width:440px;width:100%;font-size:.79rem;color:var(--text2);line-height:1.8;}
.csv-spec strong{color:var(--accent);font-weight:600;}
.csv-spec code{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--surface2);padding:1px 5px;border-radius:3px;color:#7a5c38;}

/* ── APP ── */
#app{display:none;min-height:100vh;flex-direction:column;}

/* File tabs */
.top-bar{background:rgba(250,248,244,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:stretch;position:sticky;top:0;z-index:60;min-height:52px;}
.file-tabs{display:flex;align-items:stretch;flex:1;overflow-x:auto;scrollbar-width:none;}
.file-tabs::-webkit-scrollbar{display:none;}
.file-tab{display:flex;align-items:center;gap:7px;padding:0 16px;height:52px;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:500;color:var(--text3);cursor:pointer;border-right:1px solid var(--border);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:transparent;flex-shrink:0;border-top:none;border-left:none;}
.file-tab:hover{color:var(--text);background:var(--surface2);}
.file-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;background:var(--surface);}
.tab-close{font-size:.68rem;color:var(--text3);opacity:0;transition:opacity .15s;padding:1px 4px;border-radius:3px;line-height:1;}
.file-tab:hover .tab-close{opacity:1;}
.tab-close:hover{background:var(--border2);color:var(--text);}
.add-file-btn{display:flex;align-items:center;justify-content:center;width:48px;flex-shrink:0;font-size:1.1rem;color:var(--text3);cursor:pointer;border:none;background:transparent;transition:all .15s;border-right:1px solid var(--border);}
.add-file-btn:hover{color:var(--accent);background:var(--surface2);}
#csv-input-add{display:none;}

/* Section nav */
.section-nav{background:var(--bg);border-bottom:1px solid var(--border);display:flex;padding:0 16px;}
.snav-btn{background:none;border:none;font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:500;color:var(--text3);padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;display:flex;align-items:center;gap:6px;}
.snav-btn:hover{color:var(--text);}
.snav-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.snav-badge{font-size:.67rem;background:var(--surface2);border-radius:10px;padding:1px 7px;color:var(--text3);}
.snav-btn.active .snav-badge{background:var(--accent-l);color:var(--accent);}
.badge-red{background:rgba(179,64,64,.1)!important;color:var(--red)!important;}

.content{max-width:820px;margin:0 auto;padding:24px 20px 60px;}

/* Editable title */
.file-title-wrap{display:flex;align-items:center;gap:8px;margin-bottom:18px;}
.file-title{font-family:'Lora',serif;font-size:1.4rem;color:var(--text);border:none;background:transparent;outline:none;border-bottom:2px solid transparent;transition:border-color .18s;padding:2px 4px;cursor:pointer;width:100%;}
.file-title:hover{border-bottom-color:var(--border2);}
.file-title:focus{border-bottom-color:var(--accent);cursor:text;}
.title-hint{font-size:.7rem;color:var(--text3);white-space:nowrap;}

/* Tag filter */
.tag-filter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.tag-btn{font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;}
.tag-btn:hover{border-color:var(--accent);color:var(--accent);}
.tag-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Section title */
.sec-title{font-family:'Lora',serif;font-size:1.05rem;color:var(--text);margin:18px 0 11px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sec-title small{font-family:'Nunito',sans-serif;font-size:.69rem;color:var(--text3);font-weight:400;}

/* Expr card */
.expr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;transition:box-shadow .18s;}
.expr-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.05);}
.expr-card.all-checked{border-left:3px solid var(--green);}
.expr-card-head{display:flex;align-items:center;padding:13px 16px;cursor:pointer;user-select:none;gap:9px;}
.expr-en{font-family:'JetBrains Mono',monospace;font-size:.91rem;font-weight:500;color:var(--accent);}
.expr-ko{font-size:.79rem;color:var(--text2);}
.expr-tag-pill{margin-left:auto;font-size:.67rem;background:var(--surface2);border-radius:8px;padding:2px 8px;color:var(--text3);white-space:nowrap;}
.expr-prog{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text3);white-space:nowrap;}
.expr-chev{font-size:.6rem;color:var(--text3);transition:transform .2s;margin-left:4px;}
.expr-card.open .expr-chev{transform:rotate(180deg);}
.expr-body{display:none;border-top:1px solid var(--border);padding:11px 14px 13px;}
.expr-card.open .expr-body{display:block;}

/* Sentence rows */
.sent-list{display:flex;flex-direction:column;gap:5px;}
.sent-row{display:flex;align-items:center;gap:9px;background:var(--surface2);border-radius:7px;padding:8px 11px;transition:background .15s;}
.sent-row.is-checked{background:#f0f7f3;opacity:.6;}
.chk-box{width:18px;height:18px;flex-shrink:0;border:2px solid var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface);}
.chk-box:hover{border-color:var(--accent);}
.chk-box.on{background:var(--accent);border-color:var(--accent);}
.chk-box.on::after{content:'✓';color:#fff;font-size:.68rem;font-weight:700;}
.sent-texts{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.81rem;line-height:1.5;}
.sent-texts.one-col{grid-template-columns:1fr;}
.s-en{color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.76rem;}
.s-ko{color:var(--text2);}

/* Start test */
.start-bar{display:flex;justify-content:center;padding:30px 0 0;}
.btn-main{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 30px;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px;}
.btn-main:hover{background:#2e5c40;transform:translateY(-1px);box-shadow:0 4px 14px rgba(61,107,79,.28);}

/* Unchecked tab */
.unc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;}
.unc-title{font-family:'Lora',serif;font-size:1.1rem;}
.btn-ghost{font-family:'Nunito',sans-serif;font-weight:600;font-size:.77rem;padding:5px 12px;border-radius:7px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.unc-group{margin-bottom:18px;}
.ug-lbl{font-size:.69rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.unc-row{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;margin-bottom:5px;transition:background .15s;}
.unc-row:hover{background:var(--surface2);}
.unc-tag{font-size:.67rem;background:var(--accent-l);color:var(--accent);border-radius:6px;padding:1px 7px;font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0;}
.unc-en{font-family:'JetBrains Mono',monospace;font-size:.79rem;color:var(--text);flex:1;}
.unc-ko{font-size:.77rem;color:var(--text2);flex:1;}

/* Test */
.prog-wrap{margin-bottom:20px;}
.prog-row{display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:2px;transition:width .35s ease;}
.prog-txt{font-size:.73rem;color:var(--text3);white-space:nowrap;}
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;min-height:460px;padding:52px 40px 36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;position:relative;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.05);}
.t-badge{position:absolute;top:16px;right:16px;font-size:.7rem;background:var(--surface2);color:var(--text3);padding:3px 11px;border-radius:10px;}
.t-tag{position:absolute;top:16px;left:16px;font-size:.7rem;background:var(--accent-l);color:var(--accent);padding:3px 11px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-weight:500;}
.test-q{font-size:1.3rem;color:var(--text);line-height:1.7;max-width:580px;font-weight:500;}
.test-hint{font-size:.8rem;color:var(--text3);background:var(--surface2);padding:5px 14px;border-radius:20px;}
.test-hint strong{color:var(--blue);}
.reveal-btn{background:var(--accent);border:none;color:#fff;border-radius:10px;padding:13px 36px;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .18s;margin-top:4px;}
.reveal-btn:hover{background:#2e5c40;transform:translateY(-1px);box-shadow:0 4px 12px rgba(61,107,79,.25);}
.ans-box{display:none;background:var(--surface2);border-radius:12px;padding:20px 24px;width:100%;max-width:580px;text-align:left;border-left:3px solid var(--accent);}
.ans-box.show{display:block;}
.ans-en{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:500;color:var(--accent);margin-bottom:6px;}
.ans-tag{font-size:.74rem;color:var(--text3);}
.rate-row{display:none;gap:9px;flex-wrap:wrap;justify-content:center;width:100%;max-width:580px;}
.rate-row.show{display:flex;}
.r-btn{flex:1;min-width:100px;max-width:148px;padding:12px 10px;border-radius:10px;border:1.5px solid;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .14s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.r-hint{font-size:.67rem;font-weight:400;opacity:.7;}
.r-again{border-color:var(--red);color:var(--red);background:rgba(179,64,64,.05);}.r-again:hover{background:rgba(179,64,64,.1);}
.r-hard{border-color:var(--orange);color:var(--orange);background:rgba(179,96,48,.05);}.r-hard:hover{background:rgba(179,96,48,.1);}
.r-good{border-color:var(--green);color:var(--green);background:rgba(42,102,69,.05);}.r-good:hover{background:rgba(42,102,69,.1);}
.r-easy{border-color:var(--blue);color:var(--blue);background:var(--blue-l);}.r-easy:hover{background:rgba(58,95,138,.14);}
.test-done{text-align:center;padding:50px 20px;}
.done-icon{font-size:3rem;margin-bottom:15px;}
.done-title{font-family:'Lora',serif;font-size:1.5rem;margin-bottom:8px;}
.done-sub{color:var(--text2);font-size:.85rem;margin-bottom:22px;line-height:1.7;}
.score-row{display:flex;gap:10px;justify-content:center;margin-bottom:22px;flex-wrap:wrap;}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;text-align:center;min-width:80px;}
.sc-n{font-size:1.55rem;font-weight:600;}
.sc-l{font-size:.68rem;color:var(--text3);margin-top:2px;}
.n-again{color:var(--red);}.n-hard{color:var(--orange);}.n-good{color:var(--green);}.n-easy{color:var(--blue);}
.btn-retry{background:var(--surface);border:1.5px solid var(--border2);color:var(--text);border-radius:8px;padding:8px 18px;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;transition:all .15s;margin-right:7px;}
.btn-retry:hover{border-color:var(--accent);color:var(--accent);}

/* Review */
.rev-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 17px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.rev-count{font-size:1.5rem;font-weight:600;color:var(--accent);}
.rev-label{font-size:.75rem;color:var(--text2);margin-top:2px;}
.rev-list{display:flex;flex-direction:column;gap:6px;}
.rev-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:9px;}
.rev-en{font-family:'JetBrains Mono',monospace;font-size:.81rem;color:var(--accent);}
.rev-ko{font-size:.77rem;color:var(--text2);}
.due-chip{margin-left:auto;font-size:.67rem;padding:2px 8px;border-radius:9px;white-space:nowrap;font-weight:600;}
.chip-today{background:rgba(179,64,64,.1);color:var(--red);}
.chip-soon{background:rgba(179,96,48,.1);color:var(--orange);}
.chip-later{background:rgba(42,102,69,.08);color:var(--green);}
.chip-none{background:var(--surface2);color:var(--text3);}
.rev-sec{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:16px 0 7px;}

/* Empty / no file */
.empty-state{text-align:center;padding:56px 20px;color:var(--text3);}
.e-icon{font-size:2.4rem;margin-bottom:12px;}
.empty-state p{font-size:.85rem;line-height:1.7;}

.fade-in{animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<!-- UPLOAD (first visit) -->
<div id="upload-screen">
  <div class="logo-big">English Study<span>CSV 파일을 올려서 학습을 시작하세요</span></div>
  <div class="drop-zone" id="init-drop" onclick="document.getElementById('csv-input-init').click()">
    <div class="drop-icon">📊</div>
    <h3>CSV 파일 올리기</h3>
    <p>클릭하거나 드래그해서 업로드<br><strong>.csv</strong> 파일 지원 · 여러 파일 동시 가능</p>
  </div>
  <input type="file" id="csv-input-init" accept=".csv" multiple>
  <div class="csv-spec">
    <strong>📌 CSV 형식</strong><br>
    첫 줄: <code>type,en,ko,tag</code><br>
    <code>type</code>: <code>expr</code> (표현) 또는 <code>sentence</code> (예문/테스트)<br>
    <code>en</code>: 영어 &nbsp;|&nbsp; <code>ko</code>: 한국어 &nbsp;|&nbsp; <code>tag</code>: 표현 연결 (선택)
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div class="file-tabs" id="file-tabs"></div>
    <button class="add-file-btn" title="파일 추가" onclick="document.getElementById('csv-input-add').click()">＋</button>
    <input type="file" id="csv-input-add" accept=".csv" multiple>
  </div>
  <nav class="section-nav">
    <button class="snav-btn active" id="snav-study"     onclick="switchSection('study')">📖 학습 <span class="snav-badge" id="b-study">0</span></button>
    <button class="snav-btn"        id="snav-unchecked" onclick="switchSection('unchecked')">🔲 미체크 <span class="snav-badge badge-red" id="b-unchecked">0</span></button>
    <button class="snav-btn"        id="snav-test"      onclick="switchSection('test')">✏️ 테스트 <span class="snav-badge" id="b-test">0</span></button>
    <button class="snav-btn"        id="snav-review"    onclick="switchSection('review')">🔄 복습 <span class="snav-badge" id="b-review">0</span></button>
  </nav>
  <div class="content">
    <div id="c-study"     class="fade-in"></div>
    <div id="c-unchecked" style="display:none"></div>
    <div id="c-test"      style="display:none"></div>
    <div id="c-review"    style="display:none"></div>
  </div>
</div>

<script>
/* ════════════ KEYS ════════════ */
const K_FILES   = 'es_files_v2';
const K_SRS     = 'es_srs_v2';
const K_CHECKS  = 'es_checks_v2';
const K_ACTIVE  = 'es_active_v2';

/* ════════════ STATE ════════════ */
let files = [];       // [{id,name,csv,rows}]
let activeId = null;
let activeSection = 'study';
let activeTag = 'all';
let testQueue = [], testIdx = 0, testRes = {};

/* ════════════ STORAGE ════════════ */
function saveFiles(){
  try{ localStorage.setItem(K_FILES, JSON.stringify(files.map(f=>({id:f.id,name:f.name,csv:f.csv})))); }catch(e){console.warn('Storage full',e);}
}
function loadFiles(){
  try{
    const raw=JSON.parse(localStorage.getItem(K_FILES)||'[]');
    files=raw.map(f=>({...f,rows:parseRows(f.csv)}));
  }catch{files=[];}
}
function saveActive(){ try{localStorage.setItem(K_ACTIVE,activeId||'');}catch{} }
function loadActive(){ try{return localStorage.getItem(K_ACTIVE)||null;}catch{return null;} }

function loadSRS(){ try{return JSON.parse(localStorage.getItem(K_SRS)||'{}');}catch{return{};} }
function saveSRS(d){ try{localStorage.setItem(K_SRS,JSON.stringify(d));}catch{} }
function getSRS(id){ return loadSRS()[id]||{interval:0,ef:2.5,due:null}; }
function updateSRS(id,r){
  const srs=loadSRS(); let s=srs[id]||{interval:0,ef:2.5,due:null};
  const q={again:0,hard:3,good:4,easy:5}[r];
  if(q<3){s.interval=1;}
  else{
    if(!s.interval)s.interval=1;
    else if(s.interval===1)s.interval=6;
    else s.interval=Math.round(s.interval*s.ef);
    s.ef=Math.max(1.3,s.ef+0.1-(5-q)*0.08);
  }
  const d=new Date();d.setDate(d.getDate()+s.interval);
  s.due=d.toISOString().split('T')[0];
  srs[id]=s;saveSRS(srs);
}
function isDue(id){const s=getSRS(id);if(!s.due)return true;return s.due<=new Date().toISOString().split('T')[0];}
function isLearned(id){return getSRS(id).due!==null;}

function loadChecks(){try{return JSON.parse(localStorage.getItem(K_CHECKS)||'{}');}catch{return{};}}
function saveChecks(d){try{localStorage.setItem(K_CHECKS,JSON.stringify(d));}catch{}}
function isChecked(id){return!!loadChecks()[id];}
function toggleCheck(id){const c=loadChecks();if(c[id])delete c[id];else c[id]=true;saveChecks(c);}

/* ════════════ CSV PARSE ════════════ */
function splitLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);return res;
}
function parseRows(csv){
  const lines=csv.trim().split('\n');
  if(!lines.length)return[];
  const hdr=lines[0].toLowerCase().split(',').map(s=>s.trim().replace(/"/g,''));
  const iT=hdr.indexOf('type'),iE=hdr.indexOf('en'),iK=hdr.indexOf('ko'),iG=hdr.indexOf('tag');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=splitLine(lines[i]);
    if(!c||c.length<2)continue;
    const r={
      type:(c[iT]||'sentence').toLowerCase().trim(),
      en:(c[iE]||'').trim(),
      ko:(c[iK]||'').trim(),
      tag:(c[iG]||'').trim(),
      id:`r${i}_${(c[iE]||'').slice(0,10).replace(/\W/g,'')}`
    };
    if(r.en)rows.push(r);
  }
  return rows;
}

/* ════════════ FILE MANAGEMENT ════════════ */
function addFiles(fileList){
  const readers=Array.from(fileList).map(f=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const id='f'+Date.now()+Math.random().toString(36).slice(2,5);
      res({id,name:f.name.replace(/\.csv$/i,''),csv:e.target.result,rows:parseRows(e.target.result)});
    };
    r.readAsText(f);
  }));
  Promise.all(readers).then(nf=>{
    // avoid duplicates by name
    nf.forEach(f=>{
      if(!files.find(x=>x.name===f.name&&x.csv===f.csv))files.push(f);
    });
    saveFiles();
    if(!activeId||!files.find(f=>f.id===activeId))activeId=nf[0].id;
    saveActive();
    showApp();
    renderFileTabs();
    renderAll();
  });
}

function removeFile(id,e){
  e.stopPropagation();
  if(files.length===1){if(!confirm('마지막 파일입니다. 삭제할까요?'))return;}
  files=files.filter(f=>f.id!==id);
  saveFiles();
  if(activeId===id)activeId=files.length?files[0].id:null;
  saveActive();
  if(!files.length){showUpload();return;}
  renderFileTabs();renderAll();
}

function switchFile(id){
  if(activeId===id)return;
  activeId=id;activeTag='all';activeSection='study';
  saveActive();
  renderFileTabs();
  testQueue=[];testIdx=0;
  renderAll();
}

function cf(){return files.find(f=>f.id===activeId)||null;}
function rows(){return cf()?.rows||[];}
function exprs(){return rows().filter(r=>r.type==='expr');}
function sents(){return rows().filter(r=>r.type==='sentence');}

/* ════════════ FILE TABS ════════════ */
function renderFileTabs(){
  document.getElementById('file-tabs').innerHTML=files.map(f=>`
    <div class="file-tab ${f.id===activeId?'active':''}" onclick="switchFile('${f.id}')">
      <span>${esc(f.name)}</span>
      <span class="tab-close" onclick="removeFile('${f.id}',event)" title="삭제">✕</span>
    </div>`).join('');
}

/* ════════════ SECTIONS ════════════ */
function switchSection(sec){
  activeSection=sec;
  ['study','unchecked','test','review'].forEach(s=>{
    document.getElementById(`snav-${s}`).classList.toggle('active',s===sec);
    const c=document.getElementById(`c-${s}`);
    c.style.display=s===sec?'block':'none';
    if(s===sec)c.classList.add('fade-in');
  });
  if(sec==='study')renderStudy();
  if(sec==='unchecked')renderUnchecked();
  if(sec==='test')renderTest();
  if(sec==='review')renderReview();
}

function renderAll(){updateBadges();switchSection(activeSection);}

function updateBadges(){
  const ex=exprs(),sn=sents().filter(s=>s.ko);
  const unc=sn.filter(s=>!isChecked(s.id));
  const due=[...ex,...sn].filter(r=>isLearned(r.id)&&isDue(r.id));
  document.getElementById('b-study').textContent=ex.length;
  document.getElementById('b-unchecked').textContent=unc.length;
  document.getElementById('b-test').textContent=unc.length;  // 테스트 = 미체크 문장 수
  document.getElementById('b-review').textContent=due.length;
}

/* ════════════ RENAME ════════════ */
function renameFile(id,v){
  const f=files.find(f=>f.id===id);
  if(f&&v.trim()){f.name=v.trim();saveFiles();renderFileTabs();}
}

/* ════════════ STUDY ════════════ */
function renderStudy(){
  const f=cf();
  if(!f){document.getElementById('c-study').innerHTML=emptyNoFile();return;}
  const ex=exprs();
  const tags=[...new Set(ex.map(e=>e.tag).filter(Boolean))];

  let html=`<div class="file-title-wrap">
    <input class="file-title" value="${esc(f.name)}" title="클릭해서 제목 수정"
      onchange="renameFile('${f.id}',this.value)"
      onblur="renameFile('${f.id}',this.value)"
      onkeydown="if(event.key==='Enter')this.blur()">
    <span class="title-hint">✏️ 클릭해서 수정</span>
  </div>`;

  if(tags.length>1){
    html+=`<div class="tag-filter">
      <button class="tag-btn ${activeTag==='all'?'active':''}" onclick="setTag('all')">전체</button>
      ${tags.map(t=>`<button class="tag-btn ${activeTag===t?'active':''}" onclick="setTag(${JSON.stringify(t)})">${esc(t)}</button>`).join('')}
    </div>`;
  }

  const list=activeTag==='all'?ex:ex.filter(e=>e.tag===activeTag);
  if(!list.length){
    html+=`<div class="empty-state"><div class="e-icon">📭</div><p>표현 카드가 없어요.</p></div>`;
    document.getElementById('c-study').innerHTML=html;return;
  }

  html+=`<div class="sec-title">핵심 표현 <small>${list.length}개</small></div>`;

  list.forEach(expr=>{
    const related=sents().filter(s=>s.tag===expr.en||s.en.toLowerCase().includes(expr.en.toLowerCase()));
    const total=related.length,checked=related.filter(s=>isChecked(s.id)).length;
    const allDone=total>0&&checked===total;

    html+=`<div class="expr-card ${allDone?'all-checked':''}" id="ec_${expr.id}">
      <div class="expr-card-head" onclick="toggleExpr('${expr.id}')">
        <span class="expr-en">${esc(expr.en)}</span>
        <span class="expr-ko">${esc(expr.ko)}</span>
        ${expr.tag?`<span class="expr-tag-pill">${esc(expr.tag)}</span>`:''}
        ${total?`<span class="expr-prog" id="ep_${expr.id}">${checked}/${total}</span>`:''}
        <span class="expr-chev">▼</span>
      </div>
      <div class="expr-body">
        ${total?`<div class="sent-list">
          ${related.map(s=>`<div class="sent-row ${isChecked(s.id)?'is-checked':''}" id="sr_${s.id}">
            <div class="chk-box ${isChecked(s.id)?'on':''}" onclick="chkSent('${s.id}','${expr.id}')"></div>
            <div class="sent-texts ${!s.ko?'one-col':''}">
              <span class="s-en">${esc(s.en)}</span>
              ${s.ko?`<span class="s-ko">${esc(s.ko)}</span>`:''}
            </div>
          </div>`).join('')}
        </div>`:`<p style="font-size:.78rem;color:var(--text3)">예문 없음</p>`}
      </div>
    </div>`;
  });

  html+=`<div class="start-bar"><button class="btn-main" onclick="switchSection('test')">✏️ 테스트 시작 →</button></div>`;
  document.getElementById('c-study').innerHTML=html;
}

function setTag(t){activeTag=t;renderStudy();}
function toggleExpr(id){document.getElementById(`ec_${id}`)?.classList.toggle('open');}

function chkSent(sid,exprId){
  toggleCheck(sid);
  const row=document.getElementById(`sr_${sid}`);
  if(row){
    row.classList.toggle('is-checked',isChecked(sid));
    row.querySelector('.chk-box').classList.toggle('on',isChecked(sid));
  }
  // update progress counter
  const expr=exprs().find(e=>e.id===exprId);
  if(expr){
    const rel=sents().filter(s=>s.tag===expr.en||s.en.toLowerCase().includes(expr.en.toLowerCase()));
    const total=rel.length,checked=rel.filter(s=>isChecked(s.id)).length;
    const card=document.getElementById(`ec_${exprId}`);
    if(card){
      card.classList.toggle('all-checked',total>0&&checked===total);
      const prog=document.getElementById(`ep_${exprId}`);
      if(prog)prog.textContent=`${checked}/${total}`;
    }
  }
  updateBadges();
}

/* ════════════ UNCHECKED ════════════ */
function renderUnchecked(){
  const sn=sents().filter(s=>s.ko);
  const unc=sn.filter(s=>!isChecked(s.id));
  let html=`<div class="unc-header">
    <div class="unc-title">미체크 문장 <small style="font-size:.74rem;color:var(--text3);font-family:'Nunito',sans-serif;font-weight:400">(${unc.length}개)</small></div>
    ${unc.length?`<button class="btn-ghost" onclick="checkAll()">모두 체크</button>`:''}
  </div>`;
  if(!unc.length){
    html+=`<div class="empty-state"><div class="e-icon">✅</div><p>모든 문장을 체크했어요!</p></div>`;
    document.getElementById('c-unchecked').innerHTML=html;return;
  }
  const byTag={};
  unc.forEach(s=>{const k=s.tag||'기타';if(!byTag[k])byTag[k]=[];byTag[k].push(s);});
  Object.entries(byTag).forEach(([tag,list])=>{
    html+=`<div class="unc-group"><div class="ug-lbl">${esc(tag)} · ${list.length}개</div>`;
    list.forEach(s=>{
      html+=`<div class="unc-row" id="ur_${s.id}">
        <span class="unc-tag">${esc(s.tag||'—')}</span>
        <span class="unc-en">${esc(s.en)}</span>
        <span class="unc-ko">${esc(s.ko)}</span>
        <div class="chk-box ${isChecked(s.id)?'on':''}" onclick="chkUnc('${s.id}')"></div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('c-unchecked').innerHTML=html;
}

function chkUnc(sid){
  toggleCheck(sid);
  if(isChecked(sid)){
    const row=document.getElementById(`ur_${sid}`);
    if(row){row.style.transition='opacity .28s';row.style.opacity='0';setTimeout(()=>{renderUnchecked();updateBadges();},300);}
  }else{
    const chk=document.getElementById(`ur_${sid}`)?.querySelector('.chk-box');
    if(chk)chk.classList.remove('on');
    updateBadges();
  }
}
function checkAll(){
  sents().filter(s=>s.ko&&!isChecked(s.id)).forEach(s=>{const c=loadChecks();c[s.id]=true;saveChecks(c);});
  renderUnchecked();updateBadges();
}

/* ════════════ TEST ════════════ */
function buildQueue(){
  // 체크되지 않은 문장만 테스트 대상
  testQueue=sents().filter(s=>s.ko&&s.en&&!isChecked(s.id)).sort(()=>Math.random()-.5);
  testIdx=0;testRes={again:0,hard:0,good:0,easy:0};
}
function renderTest(){
  const area=document.getElementById('c-test');
  if(!cf()){area.innerHTML=emptyNoFile();return;}
  // 미체크 문장만 테스트
  const unchecked=sents().filter(s=>s.ko&&s.en&&!isChecked(s.id));
  if(!unchecked.length){
    area.innerHTML=`<div class="empty-state">
      <div class="e-icon">✅</div>
      <p>테스트할 문장이 없어요.<br>모든 문장이 체크된 상태입니다.<br><br>
      <span style="font-size:.82rem;color:var(--text2)">학습탭에서 체크를 해제하면 테스트에 추가됩니다.</span></p>
    </div>`;
    return;
  }
  // 큐가 비었거나 체크 상태가 바뀐 경우 재구성
  if(!testQueue.length)buildQueue();
  if(testIdx>=testQueue.length){renderTestDone();return;}
  const s=testQueue[testIdx];
  const pct=(testIdx/testQueue.length)*100;
  area.innerHTML=`
    <div class="prog-wrap"><div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="prog-txt">${testIdx+1} / ${testQueue.length} · 미체크 문장</span>
    </div></div>
    <div class="test-card">
      <span class="t-badge">한국어 → 영어</span>
      ${s.tag?`<span class="t-tag">${esc(s.tag)}</span>`:''}
      <div class="test-q">${esc(s.ko)}</div>
      <div class="test-hint">힌트: <strong>${esc(s.tag||'—')}</strong></div>
      <button class="reveal-btn" onclick="revealAns()">정답 확인 →</button>
      <div class="ans-box" id="ans-box">
        <div class="ans-en">${esc(s.en)}</div>
        <div class="ans-tag">표현: ${esc(s.tag||'—')}</div>
      </div>
      <div class="rate-row" id="rate-row">
        <button class="r-btn r-again" onclick="rate('again')">다시<span class="r-hint">전혀 몰랐어</span></button>
        <button class="r-btn r-hard" onclick="rate('hard')">어려움<span class="r-hint">힘들었어</span></button>
        <button class="r-btn r-good" onclick="rate('good')">알겠음<span class="r-hint">잠깐 생각했어</span></button>
        <button class="r-btn r-easy" onclick="rate('easy')">쉬움<span class="r-hint">바로 나왔어</span></button>
      </div>
    </div>`;
}
function revealAns(){
  document.getElementById('ans-box').classList.add('show');
  document.querySelector('.reveal-btn').style.display='none';
  document.getElementById('rate-row').classList.add('show');
}
function rate(r){updateSRS(testQueue[testIdx].id,r);testRes[r]++;testIdx++;renderTest();}
function retryTest(){buildQueue();renderTest();}
function renderTestDone(){
  document.getElementById('c-test').innerHTML=`<div class="test-done">
    <div class="done-icon">🎉</div><div class="done-title">테스트 완료!</div>
    <div class="done-sub">오늘의 테스트를 마쳤어요.<br>복습 주기가 자동으로 업데이트됩니다.</div>
    <div class="score-row">
      <div class="score-card"><div class="sc-n n-again">${testRes.again}</div><div class="sc-l">다시</div></div>
      <div class="score-card"><div class="sc-n n-hard">${testRes.hard}</div><div class="sc-l">어려움</div></div>
      <div class="score-card"><div class="sc-n n-good">${testRes.good}</div><div class="sc-l">알겠음</div></div>
      <div class="score-card"><div class="sc-n n-easy">${testRes.easy}</div><div class="sc-l">쉬움</div></div>
    </div>
    <button class="btn-retry" onclick="retryTest()">다시 테스트</button>
    <button class="btn-main" onclick="switchSection('review')">복습 일정 확인 →</button>
  </div>`;
  updateBadges();
}

/* ════════════ REVIEW ════════════ */
function renderReview(){
  const area=document.getElementById('c-review');
  if(!cf()){area.innerHTML=emptyNoFile();return;}
  const today=new Date().toISOString().split('T')[0];
  const all=[...exprs(),...sents().filter(s=>s.ko)];
  const learned=all.filter(r=>isLearned(r.id));
  const dueToday=learned.filter(r=>isDue(r.id));
  const upcoming=learned.filter(r=>!isDue(r.id)).sort((a,b)=>getSRS(a.id).due.localeCompare(getSRS(b.id).due));
  const notStarted=all.filter(r=>!isLearned(r.id));
  let html=`<div class="rev-summary">
    <div><div class="rev-count">${dueToday.length}개</div><div class="rev-label">오늘 복습 예정</div></div>
    <button class="btn-main" onclick="switchSection('test')" style="font-size:.79rem;padding:9px 16px">테스트 시작 →</button>
  </div>`;
  if(dueToday.length){html+=`<div class="rev-sec">오늘 복습</div><div class="rev-list">`;dueToday.forEach(r=>{html+=rRow(r,'chip-today','오늘');});html+=`</div>`;}
  if(upcoming.length){
    html+=`<div class="rev-sec">예정된 복습</div><div class="rev-list">`;
    upcoming.slice(0,30).forEach(r=>{
      const due=getSRS(r.id).due;
      const days=Math.round((new Date(due)-new Date(today))/86400000);
      html+=rRow(r,days<=3?'chip-soon':'chip-later',days===1?'내일':`${days}일 후`);
    });
    html+=`</div>`;
  }
  if(notStarted.length){
    html+=`<div class="rev-sec">아직 학습 안 함 (${notStarted.length}개)</div><div class="rev-list">`;
    notStarted.slice(0,20).forEach(r=>{html+=rRow(r,'chip-none','미시작',true);});
    html+=`</div>`;
  }
  area.innerHTML=html;
}
function rRow(r,cls,lbl,dim=false){
  return `<div class="rev-row"${dim?' style="opacity:.5"':''}>
    <span class="rev-en">${esc(r.en)}</span><span class="rev-ko">${esc(r.ko)}</span>
    <span class="due-chip ${cls}">${lbl}</span></div>`;
}

/* ════════════ HELPERS ════════════ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function emptyNoFile(){return`<div class="empty-state"><div class="e-icon">📂</div><p>파일을 선택해주세요.</p></div>`;}
function showApp(){document.getElementById('upload-screen').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('app').style.flexDirection='column';}
function showUpload(){document.getElementById('app').style.display='none';document.getElementById('upload-screen').style.display='flex';}

/* ════════════ EVENTS ════════════ */
document.getElementById('csv-input-init').addEventListener('change',e=>{if(e.target.files.length)addFiles(e.target.files);});
document.getElementById('csv-input-add').addEventListener('change',e=>{if(e.target.files.length)addFiles(e.target.files);});
const idrop=document.getElementById('init-drop');
idrop.addEventListener('dragover',e=>{e.preventDefault();idrop.classList.add('over');});
idrop.addEventListener('dragleave',()=>idrop.classList.remove('over'));
idrop.addEventListener('drop',e=>{e.preventDefault();idrop.classList.remove('over');if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});

/* ════════════ BOOT ════════════ */
(function(){
  loadFiles();
  const saved=loadActive();
  if(files.length){
    activeId=(saved&&files.find(f=>f.id===saved))?saved:files[0].id;
    showApp();renderFileTabs();renderAll();
  }
})();
</script>
